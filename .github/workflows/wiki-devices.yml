name: Generate XSense Devices Table

on:
  push:
    branches:
      - main
    paths:
      - python/python-xsense/xsense/entity_map.py

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Generate Devices Markdown Table
        run: |
          node <<EOF
          const fs = require("fs");
      
          const file = "python/python-xsense/xsense/entity_map.py";
          const out = "Devices.md";
      
          const data = fs.readFileSync(file, "utf8");
      
          const regex = /'([A-Z0-9\-]+)'\s*:\s*\{/g;
      
          const items = [];
      
          let match;
          while ((match = regex.exec(data)) !== null) {
            const model = match[1];
      
            const blockRegex = new RegExp(`'${model}'\\s*:\\s*\\{([\\s\\S]*?)\\}`);
            const blockMatch = data.match(blockRegex);
      
            let type = "Unknown";
            let desc = "No description available.";
      
            if (blockMatch) {
              const block = blockMatch[1];
      
              const typeMatch = block.match(/EntityType\.([A-Z_]+)/);
              if (typeMatch) type = typeMatch[1];
      
              const descMap = {
                BASE: "Smart base station or legacy controller",
                LISTENER: "Alarm listener",
                SMOKE: "Smoke detector",
                CO: "CO detector",
                HEAT: "Heat detector",
                COMBI: "Combined smoke/CO detector",
                WATER: "Water leak sensor",
                TEMPERATURE: "Temp & humidity sensor",
                MOTION: "Motion sensor",
                DOOR: "Door sensor",
                KEYPAD: "Keypad",
                MAILBOX: "Mailbox sensor"
              };
      
              desc = descMap[type] || "No description available.";

            }
      
            items.push({ model, type, desc });
          }
      
          const seen = new Set();
          const unique = items
            .filter(i => !seen.has(i.model) && seen.add(i.model))
            .sort((a,b) => a.model.localeCompare(b.model));
      
          const mdLines = [
            "| Model | Type | Description |",
            "| ------------ | ----------- | ------------------------------------------------------------------------------------------ |"
          ];
      
          for (const i of unique) {
            mdLines.push(`| **${i.model}** | ${i.type} | ${i.desc} |`);
          }
      
          fs.writeFileSync(out, mdLines.join("\n") + "\n");
          console.log("Generated", out);
          EOF


      - name: Commit Wiki File
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Devices.md
          git commit -m "auto: update devices table" || exit 0
          git push
