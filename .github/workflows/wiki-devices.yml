name: Auto Wiki Devices (No Images)

on:
  push:
    branches:
      - main
    paths:
      - python/python-xsense/xsense/entity_map.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Wiki Markdown
        run: |
          node - <<'EOF'
          const fs = require("fs");

          const file = "python/python-xsense/xsense/entity_map.py";
          const out = "Devices.md";

          const data = fs.readFileSync(file, "utf8");

          // Extract full entity blocks
          const regex = /'([A-Z0-9\-]+)'\s*:\s*\{([\s\S]*?)\}/g;

          const typeMap = {
            BASE: "Base Station",
            LISTENER: "Listener",
            SMOKE: "Smoke Detector",
            CO: "CO Detector",
            HEAT: "Heat Detector",
            COMBI: "Combination Detector",
            WATER: "Water Leak Sensor",
            TEMPERATURE: "Temperature Sensor",
            MOTION: "Motion Sensor",
            DOOR: "Door Sensor",
            KEYPAD: "Keypad",
            MAILBOX: "Mailbox Sensor"
          };

          const descMap = {
            BASE: "Controls and connects all X-Sense devices.",
            LISTENER: "Listens to existing alarms and forwards them to the system.",
            SMOKE: "Detects smoke and triggers fire alarms.",
            CO: "Detects carbon monoxide gas.",
            HEAT: "Detects high temperature instead of smoke.",
            COMBI: "Combined smoke and CO detection in one device.",
            WATER: "Detects water leaks and flooding.",
            TEMPERATURE: "Measures temperature and humidity.",
            MOTION: "Detects movement in a monitored area.",
            DOOR: "Detects open/close state of doors or windows.",
            KEYPAD: "Control panel for arming/disarming alarms.",
            MAILBOX: "Detects mail delivery in mailbox."
          };

          let match;
          const items = [];

          while ((match = regex.exec(data)) !== null) {
            const model = match[1];
            const body = match[2];

            const typeMatch = body.match(/EntityType\.([A-Z_]+)/);
            const type = typeMatch ? typeMatch[1] : "UNKNOWN";

            items.push({ model, type });
          }

          const grouped = {};

          for (const item of items) {
            if (!grouped[item.type]) grouped[item.type] = [];
            grouped[item.type].push(item.model);
          }

          let md = "# 📦 X-Sense Devices\n\n";

          for (const type of Object.keys(grouped).sort()) {
            const title = typeMap[type] || type;
            const desc = descMap[type] || "No description available.";

            md += `## ${title}\n\n`;
            md += `> ${desc}\n\n`;

            md += "| Model | Type |\n";
            md += "|------|------|\n";

            const models = [...new Set(grouped[type])].sort();

            for (const m of models) {
              md += `| **${m}** | ${type} |\n`;
            }

            md += "\n";
          }

          fs.writeFileSync(out, md);
          console.log("Generated Devices.md");
          EOF

      - name: Clone Wiki repo
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/arteck/ioBroker.xsense.wiki.git wiki

      - name: Copy to Wiki
        run: |
          cp Devices.md wiki/Devices.md

      - name: Commit Wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Devices.md
          git commit -m "auto: update devices wiki (no images)" || exit 0
          git push
